<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candy Bucket Clicker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <h1>Candy Bucket Clicker</h1>
    <p class="counter-label">Clicks</p>
    <p class="counter" id="counter">0</p>

    <button class="clicker-button" id="clickerButton" type="button" aria-label="Click the candy bucket">
      <img src="images/clicker/candy-bucket.png" alt="Candy bucket clicker">
    </button>
  </main>

  <script src="script.js"></script>
</body>
</html>
